<!doctype html>
<!-- Credit to Crunchtop for the port-->
<!-- Note to web developers looking to add this to their website. This game can bug out and crash sometimes. Refresh the page if a crash is experienced -->
<html lang="en-us">
<head>
    <meta charset="utf-8" />
    <meta http-equiv="Content-Type" content="text/html; charset=utf-8" />
    <meta http-equiv="X-UA-Compatible" content="IE=edge" />
    <title>Sonic Mania</title>
    <link rel="icon" href="favicon.png" type="image/png">
    <style>
        * { margin: 0; padding: 0; box-sizing: border-box; }

        html, body {
            width: 100%;
            height: 100%;
            overflow: hidden;
            background-color: #000;
            text-align: center;
        }

        canvas {
            height: 100%;
            margin: auto;
            padding: 0;
            border: 0 none;
            background-color: #000;
            image-rendering: pixelated;
            visibility: hidden;
        }

        canvas.visible {
            visibility: visible;
        }

        #output { display: none; }

        #loading-screen {
            position: fixed;
            top: 0; left: 0;
            width: 100%; height: 100%;
            background: #000;
            display: flex;
            flex-direction: column;
            align-items: center;
            justify-content: center;
            z-index: 1000;
            transition: opacity 0.3s ease;
        }

        #loading-screen.fade-out {
            opacity: 0;
            pointer-events: none;
        }

        #loading-screen.hidden {
            display: none;
        }

        #loading-canvas {
            position: absolute;
            top: 0;
            left: 0;
            width: 100%;
            height: 100%;
        }

        .loading-bar-wrap {
            position: relative;
            z-index: 2;
            width: 200px;
            height: 4px;
            background: rgba(255,255,255,0.15);
            border-radius: 2px;
            overflow: hidden;
        }

        .loading-bar {
            width: 0%;
            height: 100%;
            background: #fff;
            border-radius: 2px;
            transition: width 0.3s ease-out;
        }

        .loading-texts {
            position: relative;
            z-index: 2;
            margin-bottom: 12px;
            text-align: center;
        }

        .by-lalad {
            color: rgba(255,255,255,0.7);
            font-size: 13px;
            font-weight: 500;
            letter-spacing: 0.5px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
        }

        .for-maska {
            color: rgba(255,255,255,0.45);
            font-size: 11px;
            font-weight: 400;
            letter-spacing: 0.3px;
            margin-top: 2px;
            text-shadow: 0 2px 4px rgba(0,0,0,0.5);
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
        }

        .control-panel {
            position: fixed;
            top: 15px;
            right: 15px;
            z-index: 1001;
        }

        .game-btn {
            background: rgba(0,0,0,0.6);
            border: 1px solid rgba(255,255,255,0.2);
            border-radius: 6px;
            color: white;
            padding: 8px 12px;
            font-size: 12px;
            cursor: pointer;
            display: flex;
            align-items: center;
            gap: 8px;
            backdrop-filter: blur(4px);
            transition: all 0.2s;
            min-width: 130px;
            font-family: -apple-system, BlinkMacSystemFont, 'SF Pro Display', 'SF Pro Text', 'Helvetica Neue', sans-serif;
        }

        .game-btn:hover {
            background: rgba(0,0,0,0.8);
            border-color: rgba(255,255,255,0.4);
        }
    </style>
</head>
<body>

    <!-- Canvas always present and running, just invisible until fade done -->
    <canvas id="canvas" width="424" height="240" onclick="window.focus();" oncontextmenu="event.preventDefault();"></canvas>
    <textarea id="output" rows="8"></textarea>

    <div class="control-panel">
        <button id="fullscreen-button" class="game-btn">
            <svg width="14" height="14" viewBox="0 0 24 24" fill="white"><path d="M7 14H5v5h5v-2H7v-3zm-2-4h2V7h3V5H5v5zm12 7h-3v2h5v-5h-2v3zM14 5v2h3v3h2V5h-5z"/></svg>
Полный экран
        </button>
    </div>

    <div id="loading-screen">
        <canvas id="loading-canvas"></canvas>
        <div class="loading-texts">
            <div class="by-lalad">by lalad</div>
            <div class="for-maska">для маськи</div>
        </div>
        <div class="loading-bar-wrap">
            <div class="loading-bar" id="loading-bar"></div>
        </div>
    </div>

    <script type="text/javascript">
        var loadingBar = document.getElementById('loading-bar');
        var loadingScreen = document.getElementById('loading-screen');
        var fullscreenButton = document.getElementById('fullscreen-button');
        var gameCanvas = document.getElementById('canvas');
        var lc = document.getElementById('loading-canvas');
        var ctx = lc.getContext('2d');
        var W, H;

        function resize() {
            W = lc.width = window.innerWidth;
            H = lc.height = window.innerHeight;
        }
        resize();
        window.addEventListener('resize', resize);

        var rings = [];
        for (var i = 0; i < 16; i++) {
            rings.push({
                angle: (i / 16) * Math.PI * 2,
                radius: 30 + Math.random() * 20,
                speed: 0.015 + Math.random() * 0.01,
                size: 3 + Math.random() * 2,
                pulse: Math.random() * Math.PI * 2,
            });
        }

        function drawRings(progress) {
            ctx.clearRect(0, 0, W, H);
            var cx = W / 2;
            var cy = H / 2 - 20;

            for (var i = 0; i < rings.length; i++) {
                var r = rings[i];
                r.angle += r.speed;
                r.pulse += 0.03;

                var x = cx + Math.cos(r.angle) * (40 + r.radius * 1.5);
                var y = cy + Math.sin(r.angle) * (r.radius * 0.6);
                var s = r.size + Math.sin(r.pulse) * 1;
                var alpha = 0.3 + (i / rings.length) * 0.7;

                ctx.beginPath();
                ctx.arc(x, y, s, 0, Math.PI * 2 * (0.3 + progress * 0.7));
                ctx.strokeStyle = 'rgba(255,255,255,' + alpha + ')';
                ctx.lineWidth = 2;
                ctx.stroke();
            }

            var barW = 120;
            var barH = 2;
            ctx.fillStyle = 'rgba(255,255,255,0.1)';
            ctx.fillRect(cx - barW / 2, cy + 50, barW, barH);
            ctx.fillStyle = 'rgba(255,255,255,0.8)';
            ctx.fillRect(cx - barW / 2, cy + 50, barW * progress, barH);
        }

        var animId;

        function animate(progress) {
            drawRings(progress);
            animId = requestAnimationFrame(function() { animate(progress); });
        }
        animate(0);

        function finishLoading() {
            loadingBar.style.width = '100%';
            var p = 0;
            function fillToFull() {
                p = Math.min(1, p + 0.02);
                drawRings(p);
                if (p < 1) requestAnimationFrame(fillToFull);
                else {
                    cancelAnimationFrame(animId);
                    setTimeout(function() {
                        loadingScreen.classList.add('fade-out');
                        loadingScreen.addEventListener('transitionend', function() {
                            loadingScreen.classList.add('hidden');
                            gameCanvas.classList.add('visible');
                        }, { once: true });
                    }, 300);
                }
            }
            fillToFull();
        }

        fullscreenButton.onclick = function() {
            if (!document.fullscreenElement) {
                document.documentElement.requestFullscreen().catch(function() {
                    console.warn("Fullscreen failed");
                });
            } else {
                document.exitFullscreen();
            }
        };

        if (window.parent !== window) {
            window.addEventListener('message', function(e) {
                if (e.data && e.data.type === 'remap-key') {
                    var activeEl = document.activeElement;
                    if (activeEl && activeEl !== document.body) activeEl.blur();
                    var ev = new KeyboardEvent(e.data.event, {
                        key: e.data.key,
                        code: e.data.code,
                        keyCode: e.data.keyCode,
                        which: e.data.keyCode,
                        bubbles: true,
                        cancelable: true
                    });
                    document.dispatchEvent(ev);
                }
            });
        }

        var Module = {
            preRun: [function() {
                FS.mkdir('/saves');
                FS.mount(IDBFS, {}, '/saves');
                FS.syncfs(true, function(err) {
                    if (err) console.log('FS load error:', err);
                    try {
                        if (FS.analyzePath('/saves/SaveData.bin').exists) {
                            var data = FS.readFile('/saves/SaveData.bin');
                            FS.writeFile('/SaveData.bin', data);
                            console.log('Save data loaded from IndexedDB');
                        }
                    } catch(e) {
                        console.log('No existing save data found:', e);
                    }
                });
            }],
            postRun: [function() {
                finishLoading();

                setInterval(function() {
                    try {
                        var data = FS.readFile('/SaveData.bin');
                        FS.writeFile('/saves/SaveData.bin', data);
                    } catch(e) {}
                    FS.syncfs(false, function(err) {
                        if (err) console.log('FS save error:', err);
                    });
                }, 5000);
            }],
            print: function(text) { console.log(text); },
            printErr: function(text) { console.error(text); },
            canvas: (function() {
                var canvas = document.getElementById('canvas');
                canvas.addEventListener("webglcontextlost", function(e) {
                    alert('WebGL context lost. Reload the page.');
                    e.preventDefault();
                }, false);
                return canvas;
            })(),
            setStatus: function(text) {
                if (!Module.setStatus.last) Module.setStatus.last = {time: Date.now(), text: ''};
                if (text === Module.setStatus.last.text) return;

                var m = text.match(/([^(]+)\((\d+(\.\d+)?)\/(\d+)\)/);
                var now = Date.now();
                if (m && now - Module.setStatus.last.time < 30) return;

                Module.setStatus.last.time = now;
                Module.setStatus.last.text = text;

                if (m) {
                    var loaded = parseFloat(m[2]);
                    var total = parseFloat(m[4]);
                    var percent = Math.round((loaded / total) * 100);
                    loadingBar.style.width = percent + '%';
                    drawRings(percent / 100);
                } else if (text.startsWith('Downloading part')) {
                    var match = text.match(/(\d+)\/(\d+)/);
                    if (match) {
                        var p = Math.round((parseInt(match[1]) / parseInt(match[2])) * 60);
                        loadingBar.style.width = p + '%';
                        drawRings(p / 100);
                    }
                } else if (text === 'Assembling Data.data...') {
                    loadingBar.style.width = '65%';
                    drawRings(0.65);
                }
            },
            totalDependencies: 0,
            monitorRunDependencies: function(left) {
                this.totalDependencies = Math.max(this.totalDependencies, left);
                Module.setStatus(left ? 'Preparing... (' + (this.totalDependencies - left) + '/' + this.totalDependencies + ')' : '');
            }
        };

        Module.setStatus('Downloading...');

        window.addEventListener('beforeunload', function() {
            try {
                var data = FS.readFile('/SaveData.bin');
                FS.writeFile('/saves/SaveData.bin', data);
            } catch(e) {}
            FS.syncfs(false, function(err) {});
        });
    </script>
    <script src="Data.js"></script>
    <script async type="text/javascript" src="RSDKv5U.js"></script>
</body>
</html>
